<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electronic</title>
  <style>
    #app-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #app-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-ring {
      position: relative;
      width: 64px;
      height: 64px;
    }
    .loader-ring .ring {
      position: absolute;
      inset: 0;
      border: 3px solid transparent;
      border-radius: 50%;
    }
    .loader-ring .ring-outer {
      border-top-color: #4a9eff;
      animation: loaderSpin 1s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
    .loader-ring .ring-inner {
      inset: 10px;
      border-bottom-color: #6ab4ff;
      animation: loaderSpin 0.65s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite reverse;
    }
    .loader-ring .ring-dot {
      inset: 20px;
      background: #4a9eff;
      border-radius: 50%;
      border: none;
      animation: loaderPulse 1.5s ease-in-out infinite;
    }

    .loader-text {
      margin-top: 28px;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 8px;
      color: #d4d4d4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      animation: loaderFade 2.4s ease-in-out infinite;
    }

    .loader-dots {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .loader-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4a9eff;
      animation: loaderDot 1.4s ease-in-out infinite;
    }
    .loader-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }
    .loader-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes loaderSpin {
      to { transform: rotate(360deg); }
    }
    @keyframes loaderPulse {
      0%, 100% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
    }
    @keyframes loaderFade {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes loaderDot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app-loader">
    <div class="loader-ring">
      <div class="ring ring-outer"></div>
      <div class="ring ring-inner"></div>
      <div class="ring ring-dot"></div>
    </div>
    <div class="loader-text">Electronic</div>
    <div class="loader-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
